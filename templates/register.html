{% extends "base.html" %}
{% block title %}Registrarse{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Registrarse</h2>
        <p class="auth-desc">Únete a la quiniela del Mundial 2026. Máximo 20 participantes.</p>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/register" class="auth-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required placeholder="Ej: juan23" maxlength="50">
            </div>
            <div class="form-group">
                <label for="display_name">Nombre Visible</label>
                <input type="text" id="display_name" name="display_name" required placeholder="Ej: Juan Pérez" maxlength="100">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Mínimo 4 caracteres" minlength="4">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirmar Contraseña</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Repite la contraseña">
            </div>
            <button type="submit" class="btn-primary btn-full">Registrarse</button>
        </form>
        <p class="auth-link">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
    </div>
</div>
{% endblock %}
